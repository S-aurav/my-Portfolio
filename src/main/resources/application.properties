# ==================================================
# DEFAULT profile — uses H2 in-memory DB for local dev
# No need to install PostgreSQL locally
# ==================================================

spring.application.name=hq-backend

# Server
server.port=${PORT:8080}

# H2 (local dev)
spring.datasource.url=jdbc:h2:file:./data/hqdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=${JWT_SECRET:local-dev-secret-key-minimum-256-bits-long-for-hs256}
jwt.expiration-ms=86400000

# Admin credentials (single owner — no user table needed)
admin.email=${ADMIN_EMAIL:admin@hq.local}
admin.password=${ADMIN_PASSWORD:changeme}

# Actuator (for Render health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# CORS — allow Next.js dev server and prod domain
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.saurav=DEBUG
logging.level.org.springframework.security=WARN

# Multipart File Upload Settings
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
